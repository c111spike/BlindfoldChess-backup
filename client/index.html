<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>SimulChess - Professional Chess Training Platform</title>
    <meta name="description" content="SimulChess is your professional chess training platform. Master over-the-board habits, strengthen memory with blindfold training, and dominate simultaneous exhibitions. Free online chess trainer." />
    <!-- Google Search favicon (48x48 is Google's magic number) -->
    <link rel="icon" href="/favicon.png" sizes="48x48" type="image/png">
    <!-- Apple Touch Icon for iOS bookmarks -->
    <link rel="apple-touch-icon" href="/favicon.png">
    <!-- Standard browser favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
    <!-- Modern high-res fallback -->
    <link rel="icon" href="/favicon.png" sizes="any">
    <!-- Preload fonts (self-hosted - no third-party network hops) -->
    <link rel="preload" href="/fonts/inter-roman.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/jetbrains-mono.woff2" as="font" type="font/woff2" crossorigin>
    <!-- Critical CSS for above-the-fold content - prevents white screen -->
    <style>
      :root{--background:210 6% 98%;--foreground:210 8% 12%}
      .dark{--background:207 20% 14%;--foreground:210 6% 96%}
      html,body{margin:0;padding:0;min-height:100vh;background:hsl(var(--background));color:hsl(var(--foreground));font-family:'Inter',system-ui,-apple-system,sans-serif}
      #root{min-height:100vh}
      /* Hero skeleton - instant dark background before image loads */
      .hero-container{min-height:80vh;display:flex;position:relative;background:linear-gradient(to bottom,rgba(0,0,0,0.7),rgba(0,0,0,0.6),rgba(0,0,0,0.8))}
      .hero-title{color:#fff;font-weight:700;font-size:2.25rem;line-height:1.2}
      .hero-subtitle{color:rgba(255,255,255,0.9);font-size:1.125rem;line-height:1.75}
      @media(min-width:768px){.hero-title{font-size:3rem}.hero-subtitle{font-size:1.25rem}}
    </style>
    <!-- Theme initialization (must run before render to prevent flash) -->
    <script>
      (function() {
        const theme = localStorage.getItem('simul-chess-theme') || 'dark';
        document.documentElement.classList.add(theme);
      })();
    </script>
    <!-- Defer analytics to not block rendering -->
    <script defer src="https://www.googletagmanager.com/gtag/js?id=G-MRNQT1V5EY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MRNQT1V5EY');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
