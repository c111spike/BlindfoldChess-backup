<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>SimulChess - Professional Chess Training Platform</title>
    <meta name="description" content="SimulChess is your professional chess training platform. Master over-the-board habits, strengthen memory with blindfold training, and dominate simultaneous exhibitions. Free online chess trainer." />
    <!-- Google Search favicon (48x48 is Google's magic number) -->
    <link rel="icon" href="/favicon.png" sizes="48x48" type="image/png">
    <!-- Apple Touch Icon for iOS bookmarks -->
    <link rel="apple-touch-icon" href="/favicon.png">
    <!-- Standard browser favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
    <!-- Modern high-res fallback -->
    <link rel="icon" href="/favicon.png" sizes="any">
    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Only load Inter (UI) and JetBrains Mono (code/notation) - trimmed from 25+ families -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Theme initialization (must run before render to prevent flash) -->
    <script>
      (function() {
        const theme = localStorage.getItem('simul-chess-theme') || 'dark';
        document.documentElement.classList.add(theme);
      })();
    </script>
    <!-- Defer analytics to not block rendering -->
    <script defer src="https://www.googletagmanager.com/gtag/js?id=G-MRNQT1V5EY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MRNQT1V5EY');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
